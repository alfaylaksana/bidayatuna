<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Flashcard Bidayatuna</title>
<style>
  :root {
    --hijau:#2d6a4f;--hijau-muda:#40916c;--hijau-pale:#d8f3dc;
    --emas:#b7950b;--emas-pale:#fef9e7;
    --abu:#f5f5f0;--abu-tua:#6b7280;--teks:#1a1a1a;--border:#d1d5db;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--abu);min-height:100vh;display:flex;flex-direction:column;}
  .save-bar{background:var(--hijau-pale);border-bottom:1px solid var(--hijau-muda);padding:5px 14px;font-size:0.65rem;color:var(--hijau);display:flex;justify-content:space-between;}
  .header{background:var(--hijau);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:1rem;font-weight:700;}
  .header-sub{font-size:0.72rem;opacity:0.8;margin-top:2px;}
  .header-count{font-size:0.78rem;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .progress-wrap{background:rgba(0,0,0,0.1);height:5px;}
  .progress-bar{background:var(--emas);height:5px;transition:width 0.4s;}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;max-width:600px;margin:0 auto;width:100%;}
  .stat-bar{display:flex;gap:8px;width:100%;margin-bottom:14px;}
  .stat{flex:1;background:white;border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border);}
  .stat-num{font-size:1.15rem;font-weight:700;}
  .stat-label{font-size:0.58rem;color:var(--abu-tua);margin-top:1px;}
  .stat.hafal .stat-num{color:var(--hijau);}
  .stat.ulang .stat-num{color:#dc2626;}
  .stat.sisa .stat-num{color:var(--emas);}
  .stat.streak .stat-num{color:#7c3aed;}
  .srs-badge{width:100%;text-align:center;font-size:0.68rem;color:var(--abu-tua);margin-bottom:10px;background:white;border-radius:8px;padding:6px;border:1px solid var(--border);}
  .srs-badge span{color:var(--hijau);font-weight:600;}
  .card-wrap{width:100%;perspective:1000px;margin-bottom:16px;cursor:pointer;user-select:none;}
  .card-inner{position:relative;width:100%;transition:transform 0.45s;transform-style:preserve-3d;}
  .card-inner.flipped{transform:rotateY(180deg);}
  .card-face{background:white;border-radius:16px;border:1px solid var(--border);padding:28px 20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
  .card-back{position:absolute;inset:0;transform:rotateY(180deg);background:var(--emas-pale);border-color:var(--emas);border-radius:16px;border:1px solid var(--emas);}
  .card-hint{font-size:0.65rem;color:var(--abu-tua);margin-bottom:14px;}
  .card-arab{font-family:'Traditional Arabic','Scheherazade New','Amiri',serif;font-size:2rem;line-height:1.8;color:var(--teks);direction:rtl;text-align:center;}
  .card-kode{font-size:0.68rem;color:var(--hijau);background:var(--hijau-pale);border-radius:20px;padding:3px 10px;margin-top:8px;}
  .card-bab{font-size:0.62rem;color:var(--abu-tua);margin-top:6px;font-family:'Traditional Arabic',serif;direction:rtl;}
  .card-interval{font-size:0.6rem;color:#7c3aed;margin-top:4px;}
  .card-makna-label{font-size:0.65rem;color:var(--emas);font-weight:600;margin-bottom:10px;}
  .card-makna-indo{font-family:'Traditional Arabic','Scheherazade New',serif;font-size:1.35rem;direction:rtl;color:#1a4a8a;text-align:center;line-height:1.7;}
  .card-makna-jawa{font-family:'Traditional Arabic','Scheherazade New',serif;font-size:0.95rem;direction:rtl;color:#555;text-align:center;margin-top:8px;line-height:1.6;border-top:1px dashed var(--emas);padding-top:8px;width:100%;}
  .card-makna-jawa-label{font-size:0.58rem;color:var(--abu-tua);margin-bottom:3px;}
  .btn-row{display:flex;gap:10px;width:100%;margin-bottom:12px;}
  .btn-flip{flex:1;background:var(--hijau);color:white;border:none;border-radius:12px;padding:13px;font-size:0.88rem;font-weight:700;cursor:pointer;}
  .answer-row{display:none;gap:8px;width:100%;margin-bottom:12px;}
  .answer-row.show{display:flex;}
  .btn-answer{flex:1;border:none;border-radius:12px;padding:12px 6px;font-size:0.78rem;font-weight:700;cursor:pointer;}
  .btn-lupa{background:#fef2f2;color:#dc2626;border:2px solid #fca5a5;}
  .btn-lupa:active{background:#dc2626;color:white;}
  .btn-ragu{background:#fffbeb;color:#d97706;border:2px solid #fcd34d;}
  .btn-ragu:active{background:#d97706;color:white;}
  .btn-hafal{background:var(--hijau-pale);color:var(--hijau);border:2px solid var(--hijau-muda);}
  .btn-hafal:active{background:var(--hijau);color:white;}
  .nav-row{display:flex;gap:8px;width:100%;margin-bottom:12px;}
  .btn-nav{flex:1;background:white;border:1px solid var(--border);border-radius:10px;padding:9px;font-size:0.75rem;cursor:pointer;color:var(--abu-tua);}
  .btn-acak{background:var(--emas-pale);border-color:var(--emas);color:var(--emas);font-weight:600;}
  .filter-wrap{width:100%;margin-bottom:12px;}
  .filter-label{font-size:0.68rem;color:var(--abu-tua);margin-bottom:5px;}
  .filter-row{display:flex;gap:5px;flex-wrap:wrap;}
  .filter-btn{font-size:0.65rem;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:white;cursor:pointer;color:var(--abu-tua);}
  .filter-btn.on{background:var(--hijau-pale);border-color:var(--hijau);color:var(--hijau);font-weight:600;}
  .selesai-wrap{display:none;flex-direction:column;align-items:center;padding:24px 16px;text-align:center;width:100%;}
  .selesai-wrap.show{display:flex;}
  .selesai-icon{font-size:2.8rem;margin-bottom:10px;}
  .selesai-title{font-size:1.05rem;font-weight:700;color:var(--hijau);margin-bottom:4px;}
  .selesai-sub{font-size:0.76rem;color:var(--abu-tua);margin-bottom:16px;}
  .selesai-stats{display:flex;gap:20px;margin-bottom:18px;}
  .ss-num{font-size:1.6rem;font-weight:700;}
  .ss-label{font-size:0.65rem;color:var(--abu-tua);}
  .btn-ulang{background:var(--hijau);color:white;border:none;border-radius:12px;padding:12px;font-size:0.88rem;font-weight:700;cursor:pointer;margin-bottom:8px;width:100%;}
  .btn-ulang-lupa{background:white;color:#dc2626;border:2px solid #fca5a5;border-radius:12px;padding:10px;font-size:0.82rem;cursor:pointer;width:100%;margin-bottom:8px;}
  .btn-reset-srs{background:white;color:var(--abu-tua);border:1px solid var(--border);border-radius:12px;padding:10px;font-size:0.78rem;cursor:pointer;width:100%;}
</style>
</head>
<body>
<div class="save-bar">
  <span>💾 Progress tersimpan otomatis</span>
  <span id="saveTime">—</span>
</div>
<div class="header">
  <div>
    <div class="header-title">📚 Flashcard Bidayatuna</div>
    <div class="header-sub">Kosakata Kitab Ar-Risalah</div>
  </div>
  <div class="header-count" id="headerCount">— / —</div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="main">
  <div class="stat-bar">
    <div class="stat sisa"><div class="stat-num" id="statAntrian">0</div><div class="stat-label">Antrian</div></div>
    <div class="stat hafal"><div class="stat-num" id="statHafal">0</div><div class="stat-label">Hafal ✓</div></div>
    <div class="stat ulang"><div class="stat-num" id="statUlang">0</div><div class="stat-label">Perlu Ulang</div></div>
    <div class="stat streak"><div class="stat-num" id="statStreak">0</div><div class="stat-label">🔥 Streak</div></div>
  </div>
  <div class="srs-badge" id="srsBadge">Memuat sesi...</div>
  <div class="filter-wrap">
    <div class="filter-label">Filter Bab:</div>
    <div class="filter-row" id="filterRow"></div>
  </div>
  <div class="card-wrap" id="cardWrap" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face">
        <div class="card-hint">Ketuk kartu untuk lihat makna</div>
        <div class="card-arab" id="cardArab">—</div>
        <div class="card-kode" id="cardKode"></div>
        <div class="card-bab" id="cardBab"></div>
        <div class="card-interval" id="cardInterval"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-makna-label">📖 Makna</div>
        <div class="card-makna-indo" id="cardMaknaIndo">—</div>
        <div style="width:100%">
          <div class="card-makna-jawa-label">Jawa:</div>
          <div class="card-makna-jawa" id="cardMaknaJawa">—</div>
        </div>
      </div>
    </div>
  </div>
  <div class="btn-row" id="btnFlipRow">
    <button class="btn-flip" onclick="flipCard()">👁 Lihat Makna</button>
  </div>
  <div class="answer-row" id="answerRow">
    <button class="btn-answer btn-lupa" onclick="jawab(0)">✗ Lupa</button>
    <button class="btn-answer btn-ragu" onclick="jawab(1)">~ Ragu</button>
    <button class="btn-answer btn-hafal" onclick="jawab(2)">✓ Hafal</button>
  </div>
  <div class="nav-row">
    <button class="btn-nav" onclick="prevCard()">← Kembali</button>
    <button class="btn-nav btn-acak" onclick="acakAntrian()">🔀 Acak</button>
    <button class="btn-nav" onclick="skipCard()">Lewati →</button>
  </div>
  <div class="selesai-wrap" id="selesaiWrap">
    <div class="selesai-icon">🎉</div>
    <div class="selesai-title">Alhamdulillah, sesi selesai!</div>
    <div class="selesai-sub" id="selesaiSub"></div>
    <div class="selesai-stats">
      <div><div class="ss-num" id="finalHafal" style="color:var(--hijau)">0</div><div class="ss-label">Hafal</div></div>
      <div><div class="ss-num" id="finalUlang" style="color:#dc2626">0</div><div class="ss-label">Lupa</div></div>
      <div><div class="ss-num" id="finalStreak" style="color:#7c3aed">0</div><div class="ss-label">🔥 Streak</div></div>
    </div>
    <button class="btn-ulang" onclick="ulangSesi()">🔄 Ulang Sesi Ini</button>
    <button class="btn-ulang-lupa" onclick="ulangLupa()">↩ Ulang Yang Lupa/Ragu</button>
    <button class="btn-reset-srs" onclick="resetSRS()">🗑 Reset Semua Progress</button>
  </div>
</div>
<script>

function initDB(){
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
  req.onsuccess=e=>{db=e.target.result;loadSRS();};
  req.onerror=()=>{srsData={};buildFilter();buildAntrian();};
}
function loadSRS(){
  const req=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
  req.onsuccess=e=>{
    srsData={};
    (e.target.result||[]).forEach(r=>srsData[r.id]=r);
    buildFilter();buildAntrian();updateSaveTime();
  };
}
function saveSRS(r){
  if(!db)return;
  db.transaction(STORE,'readwrite').objectStore(STORE).put(r);
  updateSaveTime();
}
function updateSaveTime(){
  const n=new Date();
  document.getElementById('saveTime').textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function getSRS(id){return srsData[id]||{id,interval:0,ease:2.5,due:0,reviews:0,lapses:0};}
function updateSRS(id,q){
  const s=getSRS(id);s.reviews++;
  if(q===0){s.lapses++;s.interval=1;s.ease=Math.max(1.3,s.ease-0.2);}
  else if(q===1){s.interval=Math.max(2,Math.floor(s.interval*1.2));s.ease=Math.max(1.3,s.ease-0.1);}
  else{if(s.interval===0)s.interval=3;else if(s.interval===1)s.interval=5;else s.interval=Math.round(s.interval*s.ease);s.ease=Math.min(3.0,s.ease+0.1);}
  s.due=antrian.length+s.interval;srsData[id]=s;saveSRS(s);return s;
}
function buildAntrian(){
  let pool=filterBab==='semua'?SEMUA:SEMUA.filter(c=>c.bab===filterBab);
  pool=pool.slice().sort((a,b)=>{
    const sa=getSRS(a.id),sb=getSRS(b.id);
    if(sa.reviews===0&&sb.reviews>0)return -1;
    if(sb.reviews===0&&sa.reviews>0)return 1;
    return(sa.due||0)-(sb.due||0);
  });
  antrian=pool;idx=0;streak=0;sesiHafal=0;sesiLupa=0;history=[];
  tampilKartu();
}
function acakAntrian(){
  for(let i=antrian.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[antrian[i],antrian[j]]=[antrian[j],antrian[i]];}
  idx=0;history=[];tampilKartu();
}
function tampilKartu(){
  document.getElementById('selesaiWrap').classList.remove('show');
  document.getElementById('cardWrap').style.display='';
  document.getElementById('btnFlipRow').style.display='flex';
  document.getElementById('answerRow').classList.remove('show');
  if(idx>=antrian.length){selesai();return;}
  const k=antrian[idx],s=getSRS(k.id);
  document.getElementById('cardArab').textContent=k.arab;
  document.getElementById('cardKode').textContent=k.kode?'['+k.kode+']':'';
  document.getElementById('cardBab').textContent=k.bab||'';
  let info=s.reviews===0?'🆕 Baru':s.lapses>0&&s.interval<=2?'🔁 Sedang diulang ('+s.lapses+'× lupa)':'✓ Review ke-'+s.reviews;
  document.getElementById('cardInterval').textContent=info;
  document.getElementById('cardMaknaIndo').textContent=k.makna_indo;
  document.getElementById('cardMaknaJawa').textContent=k.makna_jawa||'—';
  sudahFlip=false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('progressBar').style.width=Math.min(100,idx/antrian.length*100)+'%';
  document.getElementById('headerCount').textContent=(idx+1)+' / '+antrian.length;
  updateStats();updateSRSBadge();
}
function updateSRSBadge(){
  const total=antrian.length;
  const baru=antrian.filter(c=>getSRS(c.id).reviews===0).length;
  const lancar=antrian.filter(c=>{const s=getSRS(c.id);return s.reviews>0&&s.interval>=5;}).length;
  document.getElementById('srsBadge').innerHTML='Sesi ini: <span>'+total+'</span> kartu · Baru: <span>'+baru+'</span> · Lancar: <span>'+lancar+'</span>';
}
function flipCard(){
  if(sudahFlip)return;sudahFlip=true;
  document.getElementById('cardInner').classList.add('flipped');
  document.getElementById('btnFlipRow').style.display='none';
  document.getElementById('answerRow').classList.add('show');
}
function jawab(q){
  const k=antrian[idx],s=updateSRS(k.id,q);
  if(q===0){streak=0;sesiLupa++;}
  else if(q===2){streak++;sesiHafal++;}
  else{streak=0;}
  history.push(idx);
  if(q<2){const ins=Math.min(idx+s.interval+1,antrian.length);antrian.splice(ins,0,k);}
  idx++;updateStats();tampilKartu();
}
function skipCard(){history.push(idx);idx++;tampilKartu();}
function prevCard(){if(history.length>0){idx=history.pop();tampilKartu();}}
function updateStats(){
  document.getElementById('statAntrian').textContent=Math.max(0,antrian.length-idx);
  document.getElementById('statHafal').textContent=sesiHafal;
  document.getElementById('statUlang').textContent=sesiLupa;
  document.getElementById('statStreak').textContent=streak;
}
function buildFilter(){
  const babs=['semua',...new Set(SEMUA.map(c=>c.bab).filter(Boolean))];
  const row=document.getElementById('filterRow');row.innerHTML='';
  babs.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(b==='semua'?' on':'');
    btn.textContent=b==='semua'?'Semua':b;
    btn.dataset.bab=b;btn.onclick=()=>setFilter(b);row.appendChild(btn);
  });
}
function setFilter(bab){
  filterBab=bab;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('on',b.dataset.bab===bab));
  buildAntrian();
}
function selesai(){
  document.getElementById('cardWrap').style.display='none';
  document.getElementById('btnFlipRow').style.display='none';
  document.getElementById('answerRow').classList.remove('show');
  document.getElementById('selesaiWrap').classList.add('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('finalHafal').textContent=sesiHafal;
  document.getElementById('finalUlang').textContent=sesiLupa;
  document.getElementById('finalStreak').textContent=streak;
  document.getElementById('selesaiSub').textContent='Hafal '+sesiHafal+' kata, perlu ulang '+sesiLupa+' kata';
}
function ulangSesi(){idx=0;streak=0;sesiHafal=0;sesiLupa=0;history=[];document.getElementById('selesaiWrap').classList.remove('show');tampilKartu();}
function ulangLupa(){
  const lupa=antrian.filter(c=>{const s=getSRS(c.id);return s.lapses>0||s.interval<=2;});
  if(!lupa.length){ulangSesi();return;}
  antrian=lupa;idx=0;streak=0;sesiHafal=0;sesiLupa=0;history=[];
  document.getElementById('selesaiWrap').classList.remove('show');tampilKartu();
}
function resetSRS(){
  if(!confirm('Reset semua progress SRS?'))return;
  if(db)db.transaction(STORE,'readwrite').objectStore(STORE).clear();
  srsData={};buildAntrian();
  document.getElementById('selesaiWrap').classList.remove('show');
}
initDB();
</script>
</body>
