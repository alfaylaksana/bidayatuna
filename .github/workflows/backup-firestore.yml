name: Backup Firestore Bidayatuna

on:
  schedule:
    # jam 00:00 WIB tiap hari (17:00 UTC hari sebelumnya)
    - cron: '0 17 * * *'
  workflow_dispatch: {}   # bisa dipicu manual dari tab "Actions" di GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Jalankan backup
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/backup-firestore.js

      - name: Commit & push jika ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup-json/
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Backup otomatis Firestore $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
